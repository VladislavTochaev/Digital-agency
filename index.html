<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport"
    content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <title>Digital Solutions | Home</title>
  <link rel="stylesheet" href="./styles/main.css" />
  <script src="./scripts/main.js" type="module" defer></script>
</head>
<body>
  <header class="header">
    <div class="header__inner container">
      <a
        class="header__logo logo" 
        href="/"
        aria-label="Home"
        title="Home"
      >
        <img 
          class="logo__image"
          src="./images/logo.svg"
          alt=""
          width="75" height="54"
        />
      </a>

      <div class="header__overlay">
        <nav class="header__menu">
          <ul class="header__menu-list">
            <li class="header__menu-item">
              <a href="/" class="header__menu-link is-active">Home</a>
            </li>
            <li class="header__menu-item">
              <a href="/" class="header__menu-link">Services</a>
            </li>
            <li class="header__menu-item">
              <a href="/" class="header__menu-link">Projects</a>
            </li>
            <li class="header__menu-item">
              <a href="/" class="header__menu-link">About Us</a>
            </li>
            <li class="header__menu-item">
              <a href="/" class="header__menu-link">Contact Us</a>
            </li>
            <li class="header__menu-item">
              <a href="/" class="header__menu-link">Careers</a>
            </li>
            <li class="header__menu-item">
              <a href="/" class="header__menu-link">Blogs</a>
            </li>
          </ul>
        </nav>
      </div>
      
      <button
        class="header__burger-button burger-button visible-mobile"
        type="button"
        aria-label="Open menu"
        title="Open menu"
      >
        <span class="burger-button__line"></span>
        <span class="burger-button__line"></span>
        <span class="burger-button__line"></span>
      </button>
    </div>
  </header>
</body>
</html>
